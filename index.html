<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>엄태성의 포트폴리오</title>
    <link rel="stylesheet" href="./assets/styles/style.css">
</head>
<body>
    <div class="wrap">
        <!-- header -->
        <div class="header">
            <h1 class="logo"><a href="javascript:void(0)">EOM's Portfolio</a></h1>
        </div>

        <!-- page -->
        <div class="pageArea">
            <!-- part:intro -->
            <!-- 타이틀x
            <div class="part intro">
                <b>개발노트</b>
                <p>
                    안녕하세요<br>
                    최선을 다하는 개발자 <br>
                    엄태성입니다
                </p>
            </div>
             -->
            <!-- part:archiving -->
            <div class="part archiving">
                <br><br>
                <p class="title">ARCHIVING</p>
                <div class="linkList">
                    <!-- href에 url 넣어라 -->
                    <a href="www.naver.com">
                        <span class="tit">제목</span>
                        <span class="url">www.naver.com</span>
                        <p class="txt">설명입니다</p>
                    </a>
                    <a href="www.naver.com">
                        <span class="tit">제목</span>
                        <span class="url">www.naver.com</span>
                        <p class="txt">설명입니다</p>
                    </a>
                </div>
            </div>
            <!-- part:skills -->
            <div class="part skills">
                <br>
                <p class="title">SKILLS</p>
                <ul class="skillList">
                    <li>
                        <div class="titBox">
                            <img src="./assets//images/icon_Language.svg" alt="img">
                            <b>Language</b>
                        </div>
                        <div class="badgeBox">
                            <span class="blue1">C#</span>
                            <span class="blue2">Python</span>
                            <span class="blue3">Lua</span>
                            <span class="blue4">Java</span>
                            <span class="blue5">C++</span>
                            <span class="blue6">SQL</span>
                        </div>
                    </li>
                    <li>
                        <div class="titBox">
                            <img src="./assets//images/icon_Tool.svg" alt="img">
                            <b>Tool</b>
                        </div>
                        <div class="badgeBox">
                            <span class="blue1">Unity</span>
                            <span class="blue2">Visual Studio Code</span>
                            <span class="blue3">Docker</span>
                            <span class="blue4">Jenkins</span>
                        </div>
                    </li>
                    <li>
                        <div class="titBox">
                            <img src="./assets//images/icon_Collaboration.svg" alt="img">
                            <b>Collaboration</b>
                        </div>
                        <div class="badgeBox">
                            <span class="blue1">Git</span>
                            <span class="blue2">Slack</span>
                            <span class="blue3">Jira</span>
                            <span class="blue4">Notion</span>
                            <span class="blue5">SVN</span>
                        </div>
                    </li>
                </ul>
            </div>
        </div>

        <div class="footer">
            <p>© Eom Tae Sung. All rights reserved.</p>
